name: Deploy App to Azure - Blue Green

on:
  push:
    branches:
      - main

jobs:
  deploy-blue-green:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check publish profile secret exists
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "AZURE_WEBAPP_PUBLISH_PROFILE is missing or empty"
            exit 1
          else
            echo "AZURE_WEBAPP_PUBLISH_PROFILE exists"
          fi

      - name: Build artifact
        run: |
          cd app
          zip -r app.zip index.html health.html

      - name: Verify artifact
        run: |
          ls -lah app/
          unzip -l app/app.zip

      - name: Deploy to Green Slot
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-mobilab-sandbox-8am3c
          slot-name: green
          publish-profile: ${{ secrets.AZURE_WEBAPP_GREEN_PUBLISH_PROFILE }}
          package: app/app.zip

      - name: Health Check Green Slot
        run: |
          echo "Checking green slot health..."
          curl -f https://app-mobilab-sandbox-8am3c-green.azurewebsites.net/health.html

      - name: Swap Green to Production
        run: |
          echo "Swap step requires Azure CLI authentication."
          echo "For now, this is documented as the production promotion step:"
          echo "az webapp deployment slot swap --resource-group rg-lina-playground --name app-mobilab-sandbox-8am3c --slot green --target-slot production"