name: Deploy App to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check publish profile secret exists
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "AZURE_WEBAPP_PUBLISH_PROFILE is missing or empty"
            exit 1
          else
            echo "AZURE_WEBAPP_PUBLISH_PROFILE exists"
          fi

      - name: Build artifact
        run: |
          cd app
          zip -r app.zip index.html health.html

      - name: Verify artifact
        run: |
          ls -lah app/
          unzip -l app/app.zip

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-mobilab-sandbox-8am3c
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app/app.zip