name: Terraform CI/CD Simulation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build - Terraform and App Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init Without Backend
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Create Simulated Terraform Plan
        working-directory: terraform
        run: |
          echo "Simulated Terraform plan for mobilab-secure-azure-sandbox" > terraform_plan.tfplan
          echo "Real plan/apply requires Azure authentication and RBAC permissions." >> terraform_plan.tfplan

      - name: Archive Terraform Plan
        working-directory: terraform
        run: tar -czf terraform_plan.tar.gz terraform_plan.tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/terraform_plan.tar.gz

      - name: Build App Artifact
        run: |
          mkdir -p dist
          cp app/index.html dist/index.html
          tar -czf app-artifact.tar.gz -C dist .

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app-artifact.tar.gz

  deploy:
    name: Deploy - Artifact Simulation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - name: Extract Terraform Plan
        run: tar -xzf terraform_plan.tar.gz

      - name: Show Terraform Plan Content
        run: cat terraform_plan.tfplan

      - name: Simulate Terraform Apply
        run: echo "Terraform apply would run here after Azure authentication is configured."

      - name: Download App Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Extract App Artifact
        run: |
          mkdir -p app-deploy
          tar -xzf app-artifact.tar.gz -C app-deploy
          ls -la app-deploy

      - name: Simulate App Deployment
        run: echo "App artifact would be deployed to Azure App Service here."